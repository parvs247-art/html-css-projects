<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
   *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
   }
   body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Outfit', sans-serif;
     background-color:hsl(212, 45%, 89%);
   }
   .container{
    height: 540px;  
   width: 350px;
   background-color: hsl(0, 0%, 100%);
   display: flex;
   justify-content: center;
   align-items: center;
   flex-direction: column;
   border-radius: 10px;
   }
    .Qr-image{
      height: 300px;
      width: 90%;
      background-image: url('./images/image-qr-code.png');
      background-size: cover;
      background-position: center;
      border-radius: 10px;
    }
    .content{
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
      margin: 10px;
    }
.content h2{
  color: hsl(218, 44%, 22%);
  font-weight: 700;
}
.content p{
  color: hsl(216, 15%, 54%);
  font-weight: 400;
  padding: 15px;
}
@media (max-width: 400px) {
  .container {
    width: 90%;
  }
}
  </style>
</head>
<body>
    <!-- <header> -->
    <!-- This is a solution to the <a href="https://www.frontendmentor.io/challenges/qr-code-component-iux_sIO_H">QR code component challenge</a> on Frontend Mentor. Frontend Mentor challenges help you improve your coding skills by building realistic projects. -->
  <!-- </header> -->
  <main>
    <div class="container">
      <div class="Qr-image"></div>
      <div class="content">
        <h2>Improve your front-end skills by building projects</h2>
        <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
      </div>
    </div>
  </main>

  
  
  <!-- <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Parv Shah</a>.
  </footer> -->
</body>
</html>
